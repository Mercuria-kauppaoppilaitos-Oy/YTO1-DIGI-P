<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harjoitus 3: Täyttökahva – kaavan kopioiminen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="exercise-container">
        <div class="exercise-header">
            <h1>Harjoitus 3: Täyttökahva – kaavan kopioiminen</h1>
            <p>Kirjoita kaava yhteen soluun ja kopioi se automaattisesti muihin riveihin.</p>
        </div>
        <div id="exercise" class="exercise-content"></div>
    </div>

    <script src="scorm-wrapper.js"></script>
    <script src="spreadsheet-engine.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        SCORM.init();

        const tuotteet = ['Tuote A', 'Tuote B', 'Tuote C', 'Tuote D', 'Tuote E'];
        const tammi = tuotteet.map(() => randomInt(500, 3000));
        const helmi = tuotteet.map(() => randomInt(500, 3000));

        const cells = {
            'A1': { type: 'header', value: 'Tuote' },
            'B1': { type: 'header', value: 'Tammikuu (€)' },
            'C1': { type: 'header', value: 'Helmikuu (€)' },
            'D1': { type: 'header', value: 'Yhteensä (€)' }
        };

        for (let i = 0; i < tuotteet.length; i++) {
            const r = i + 2;
            cells['A' + r] = { type: 'label', value: tuotteet[i] };
            cells['B' + r] = { type: 'data', value: tammi[i] };
            cells['C' + r] = { type: 'data', value: helmi[i] };
        }

        // Ensimmäinen rivi: opiskelija kirjoittaa kaavan
        cells['D2'] = {
            type: 'editable',
            expectedValue: tammi[0] + helmi[0],
            requiredRefs: ['B2', 'C2'],
            hint: '=B2+C2',
            placeholder: '=B2+C2'
        };

        // Loput rivit: täytetään automaattisesti täyttökahvaa vetämällä
        const fillTargets = [];
        for (let i = 1; i < tuotteet.length; i++) {
            const r = i + 2;
            fillTargets.push('D' + r);
            cells['D' + r] = {
                type: 'fill-target',
                source: 'D2',
                expectedValue: tammi[i] + helmi[i]
            };
        }

        const exercise = new SpreadsheetExercise({
            containerId: 'exercise',
            nextExerciseUrl: 'harjoitus-4-absoluuttinen-viittaus.html',
            cols: ['A', 'B', 'C', 'D'],
            rowCount: tuotteet.length + 1,
            cells: cells,
            fillGroups: [
                { source: 'D2', targets: fillTargets }
            ],
            instructions: `
                <strong>Mitä opitaan:</strong> Täyttökahva on nopea keino kopioida kaava monelle riville kerralla. Soluviittaukset päivittyvät automaattisesti jokaisella rivillä.<br><br>
                <strong>Ohje:</strong>
                <ol>
                    <li>Kirjoita soluun <strong>D2</strong> kaava <code>=B2+C2</code></li>
                    <li>Paina Enter – oikein kirjoitetusta kaavasta ilmestyy ✓ merkki</li>
                    <li>Etsi solun oikeassa alakulmassa oleva pieni neliö (<strong>täyttökahva</strong>)</li>
                    <li>Vedä täyttökahvaa hiirellä alas viimeiselle riville (D6) – kaava kopioituu ja soluviittaukset päivittyvät: =B3+C3, =B4+C4 jne.</li>
                </ol>
            `
        });

        exercise.init();
    });
    </script>
</body>
</html>
