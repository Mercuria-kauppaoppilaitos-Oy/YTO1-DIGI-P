<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harjoitus 3 – Paikallinen vai pilvi?</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a class="back-link" href="index.html">← Takaisin harjoituksiin</a>
    <div class="exercise-container">
        <div class="exercise-header">
            <h1>☁️ Harjoitus 3 – Paikallinen vai pilvi?</h1>
            <p>Raahaa tiedostot oikeaan tallennuspaikkaan. Osa A: tallennus. Osa B: tiedostopolut.</p>
        </div>
        <div id="exercise-part-a"></div>
        <div id="path-exercise" style="margin-top: 24px;"></div>
    </div>

    <script src="file-engine.js"></script>
    <script>
    // ────────────────────────────────────────────────
    // OSA A: Raahaa paikalliseen tai pilveen
    // ────────────────────────────────────────────────

    const partA = new DragSortExercise({
        containerId: 'exercise-part-a',
        infoPanel: {
            title: 'Paikallinen tallennus vs. pilvi',
            content: `
                <ul>
                    <li><strong>💻 Paikallinen tallennus</strong> (C:-asema) — tiedosto on vain tällä tietokoneella. Hyvä salaisten tai suurten tiedostojen tilapäiseen säilytykseen.</li>
                    <li><strong>☁️ Pilvi</strong> (OneDrive, Google Drive) — tiedosto synkronoituu automaattisesti. Pääset siihen miltä tahansa laitteelta. Ihanteellinen koulutöille ja jaetuille dokumenteille.</li>
                    <li><strong>Muista:</strong> tärkeät tiedostot kannattaa <em>aina</em> varmuuskopioida pilveen, vaikka työskentelisit paikallisesti!</li>
                </ul>
            `
        },
        instruction: 'Raahaa (tai klikkaa + klikkaa kohdetta) jokainen tiedosto oikeaan tallennuspaikkaan.',
        targets: [
            { id: 'local', label: 'Paikallinen (C:-asema)', icon: '💻' },
            { id: 'cloud', label: 'Pilvi (OneDrive)', icon: '☁️' }
        ],
        items: [
            { id: 'a1', text: 'Ryhmätyö, jota 3 henkilöä muokkaa', icon: '📝', correctTarget: 'cloud' },
            { id: 'a2', text: 'Valokuvia jotka haluat jakaa perheelle', icon: '🖼️', correctTarget: 'cloud' },
            { id: 'a3', text: 'Iso peliohjelma (40 GB)', icon: '🎮', correctTarget: 'local' },
            { id: 'a4', text: 'Koulutyö jota työstät kotona ja koulussa', icon: '📚', correctTarget: 'cloud' },
            { id: 'a5', text: 'Väliaikainen ladattu asennustiedosto', icon: '⬇️', correctTarget: 'local' },
            { id: 'a6', text: 'Ansioluettelo (CV) jota päivität harvoin', icon: '📋', correctTarget: 'cloud' },
            { id: 'a7', text: 'Keskeneräinen videoprojekti (10 GB)', icon: '🎬', correctTarget: 'local' },
            { id: 'a8', text: 'Tärkeä raportti josta haluat varmuuskopion', icon: '📕', correctTarget: 'cloud' }
        ]
    });

    partA.init();

    // ────────────────────────────────────────────────
    // OSA B: Tiedostopolkuharjoitus
    // ────────────────────────────────────────────────

    const pathDiv = document.getElementById('path-exercise');

    const pathQuestions = [
        {
            tree: '💻 C:\\ → 📁 Koulu → 📁 Matematiikka → 📄 kotitehtava.docx',
            answer: 'C:\\Koulu\\Matematiikka\\kotitehtava.docx',
            hint: 'Yhdistä kansiot kenoviivalla: C:\\Koulu\\...'
        },
        {
            tree: '☁️ OneDrive → 📁 Projektit → 📁 Ryhmätyö → 📄 raportti.pdf',
            answer: 'OneDrive\\Projektit\\Ryhmätyö\\raportti.pdf',
            hint: 'Pilvipolku alkaa "OneDrive\\"...'
        },
        {
            tree: '💻 C:\\ → 📁 Käyttäjät → 📁 Opiskelija → 📁 Kuvat → 📄 loma.jpg',
            answer: 'C:\\Käyttäjät\\Opiskelija\\Kuvat\\loma.jpg',
            hint: 'Koko polku juuresta tiedostoon.'
        }
    ];

    let currentQ = 0;
    let pathScore = 0;

    function renderPathExercise() {
        if (currentQ >= pathQuestions.length) {
            pathDiv.innerHTML = `
                <div class="success-message">
                    🎉 <strong>Tiedostopolut hallussa!</strong> Sait ${pathScore}/${pathQuestions.length} oikein.
                    <br><small><a href="harjoitus-4-tiedostomuodot.html" style="color: #2e7d32;">→ Siirry tiedostomuotoharjoitukseen</a></small>
                </div>`;
            return;
        }

        const q = pathQuestions[currentQ];
        pathDiv.innerHTML = `
            <div class="info-panel">
                <h3>Osa B: Tiedostopolut (${currentQ + 1}/${pathQuestions.length})</h3>
                <p>Kirjoita tiedoston <strong>koko polku</strong> alla näkyvän kansiorakenteen perusteella.</p>
            </div>
            <div class="task-panel">
                <span class="task-label">Rakenne: </span>
                <span class="task-text" style="font-family: Consolas, monospace;">${q.tree}</span>
            </div>
            <div style="display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap;">
                <input type="text" id="path-input" class="folder-input" style="flex:1; min-width: 200px; font-family: Consolas, monospace;"
                       placeholder="Kirjoita tiedostopolku tähän...">
                <button class="btn btn-next" id="path-check">Tarkista</button>
            </div>
            <div id="path-feedback"></div>
            <div class="controls">
                <button class="btn btn-hint" id="path-hint-btn">💡 Vihje</button>
            </div>
        `;

        document.getElementById('path-check').addEventListener('click', checkPath);
        document.getElementById('path-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkPath();
        });
        document.getElementById('path-hint-btn').addEventListener('click', () => {
            const fb = document.getElementById('path-feedback');
            fb.innerHTML = `<div class="hint-box">💡 ${q.hint}</div>`;
        });
    }

    function normalizePathStr(p) {
        return p.trim().replace(/\//g, '\\').replace(/\\+/g, '\\').replace(/\\$/, '').toLowerCase();
    }

    function checkPath() {
        const input = document.getElementById('path-input').value;
        const q = pathQuestions[currentQ];
        const fb = document.getElementById('path-feedback');

        if (normalizePathStr(input) === normalizePathStr(q.answer)) {
            pathScore++;
            fb.innerHTML = `<div class="hint-box" style="background:#e8f5e9; border-color:#81c784; color:#2e7d32;">
                ✅ Oikein! <strong>${q.answer}</strong></div>`;
            currentQ++;
            setTimeout(renderPathExercise, 1500);
        } else {
            fb.innerHTML = `<div class="hint-box" style="background:#ffebee; border-color:#ef9a9a; color:#c62828;">
                ❌ Ei aivan. Tarkista polku ja yritä uudelleen.</div>`;
            document.getElementById('path-input').focus();
        }
    }

    renderPathExercise();
    </script>
</body>
</html>
