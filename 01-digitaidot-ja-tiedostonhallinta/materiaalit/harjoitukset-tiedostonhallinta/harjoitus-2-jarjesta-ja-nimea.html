<body>

    <div class="exercise-container">
        <div class="exercise-header">
            <h1>📁 Harjoitus 2 – Järjestä ja nimeä tiedostot</h1>
            <p>Lataukset-kansiosi on täynnä huonosti nimettyjä tiedostoja. Luo kansiorakenne, nimeä tiedostot uudelleen ja siirrä ne oikeisiin paikkoihin.</p>
        </div>
        <div id="exercise"></div>
    </div>

    <script src="file-engine.js"></script>
    <script>
    const exercise = new FileExplorerExercise({
        containerId: 'exercise',
        infoPanel: {
            title: 'Hyvän nimeämisen periaatteet',
            content: `
                <ul>
                    <li><strong>Päivämäärä tai jakso ensin:</strong> <code>2026-01-15_</code> tai <code>2026-Q1_</code> → tiedostot järjestyvät aikajärjestykseen</li>
                    <li><strong>Kuvaava nimi:</strong> <code>budjetti_myynti</code>, ei <code>lol</code> tai <code>FINAL_v3</code></li>
                    <li><strong>Ei välilyöntejä:</strong> käytä alaviivaa <code>_</code> tai tavuviivaa <code>-</code></li>
                    <li><strong>Ei versiohistoriaa nimessä:</strong> „FINAL_v3_UUSIN (2)" → tallenna yksi selkeä versio</li>
                </ul>
            `
        },
        requiredFolders: [
            'Talous',
            'Talous/Kuitit',
            'Markkinointi',
            'Sopimukset',
            'Myynti',
            'Henkilöstö'
        ],
        files: [
            {
                name: 'BUDJETTI lopullinen v3 (2).xlsx',
                correctName: '2026-Q1_budjetti_myynti.xlsx',
                correctFolder: 'Talous',
                renameOptions: [
                    '2026-Q1_budjetti_myynti.xlsx',
                    'budjetti_lopullinen.xlsx',
                    'BUDJETTI.xlsx',

            {

                    '2026-01-15_kuitti_toimistotarvikkeet.jpg',
                    'kuitti tammikuu.jpg',
                    'KUITTI.jpg',
                    'img_02948.jpg'
                ]
            },
            {
                name: 'mainos UUSIN versio (3).pptx',
                correctName: '2026-02_kampanja_kevat.pptx',
                correctFolder: 'Markkinointi',
                renameOptions: [
                    '2026-02_kampanja_kevat.pptx',
