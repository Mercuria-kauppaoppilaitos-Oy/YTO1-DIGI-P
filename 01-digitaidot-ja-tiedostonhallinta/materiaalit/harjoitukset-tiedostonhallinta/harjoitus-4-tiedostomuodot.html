<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harjoitus 4 – Tiedostomuodot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a class="back-link" href="index.html">← Takaisin harjoituksiin</a>
    <div class="exercise-container">
        <div class="exercise-header">
            <h1>📂 Harjoitus 4 – Tiedostomuodot</h1>
            <p>Raahaa tiedostot oikeaan ryhmään tiedostopäätteen perusteella.</p>
        </div>
        <div id="exercise-formats"></div>
        <div id="quiz-section" style="margin-top: 24px;"></div>
    </div>

    <script src="file-engine.js"></script>
    <script>
    // ────────────────────────────────────────────────
    // OSA A: Raahaa tiedostomuoto oikeaan kategoriaan
    // ────────────────────────────────────────────────

    const partA = new DragSortExercise({
        containerId: 'exercise-formats',
        infoPanel: {
            title: 'Yleisimmät tiedostomuodot',
            content: `
                <ul>
                    <li><strong>📝 Tekstidokumentit:</strong> .docx (Word), .pdf (Adobe), .txt (tekstitiedosto), .odt (LibreOffice)</li>
                    <li><strong>📊 Taulukot:</strong> .xlsx (Excel), .csv (pilkueroteltu data), .ods (LibreOffice Calc)</li>
                    <li><strong>📽️ Esitykset:</strong> .pptx (PowerPoint), .odp (LibreOffice Impress)</li>
                    <li><strong>🖼️ Kuvat:</strong> .jpg / .jpeg, .png, .gif, .svg, .webp</li>
                    <li><strong>🎵 Ääni ja video:</strong> .mp3, .mp4, .wav, .avi, .mkv</li>
                    <li><strong>📦 Pakatut:</strong> .zip, .rar, .7z</li>
                </ul>
            `
        },
        instruction: 'Raahaa jokainen tiedosto oikeaan kategoriaan tiedostopäätteen perusteella.',
        targets: [
            { id: 'text',   label: 'Tekstidokumentit', icon: '📝' },
            { id: 'sheet',  label: 'Taulukot',         icon: '📊' },
            { id: 'slides', label: 'Esitykset',        icon: '📽️' },
            { id: 'image',  label: 'Kuvat',            icon: '🖼️' },
            { id: 'media',  label: 'Ääni / Video',     icon: '🎵' },
            { id: 'zip',    label: 'Pakatut',          icon: '📦' }
        ],
        items: [
            { id: 'f1',  text: 'raportti.docx',        icon: '📄', correctTarget: 'text' },
            { id: 'f2',  text: 'budjetti.xlsx',        icon: '📄', correctTarget: 'sheet' },
            { id: 'f3',  text: 'esitys.pptx',          icon: '📄', correctTarget: 'slides' },
            { id: 'f4',  text: 'kuva.jpg',             icon: '📄', correctTarget: 'image' },
            { id: 'f5',  text: 'laulu.mp3',            icon: '📄', correctTarget: 'media' },
            { id: 'f6',  text: 'arkisto.zip',          icon: '📄', correctTarget: 'zip' },
            { id: 'f7',  text: 'ohje.pdf',             icon: '📄', correctTarget: 'text' },
            { id: 'f8',  text: 'data.csv',             icon: '📄', correctTarget: 'sheet' },
            { id: 'f9',  text: 'logo.png',             icon: '📄', correctTarget: 'image' },
            { id: 'f10', text: 'video.mp4',            icon: '📄', correctTarget: 'media' },
            { id: 'f11', text: 'pakkaus.rar',          icon: '📄', correctTarget: 'zip' },
            { id: 'f12', text: 'muistio.txt',          icon: '📄', correctTarget: 'text' },
            { id: 'f13', text: 'animaatio.gif',        icon: '📄', correctTarget: 'image' },
            { id: 'f14', text: 'seminaari.odp',        icon: '📄', correctTarget: 'slides' },
            { id: 'f15', text: 'kirjanpito.ods',       icon: '📄', correctTarget: 'sheet' },
            { id: 'f16', text: 'haastattelu.wav',      icon: '📄', correctTarget: 'media' }
        ]
    });

    partA.init();

    // ────────────────────────────────────────────────
    // OSA B: Tiedostomuoto-tietovisa
    // ────────────────────────────────────────────────

    const quizData = [
        {
            question: 'Millä ohjelmalla avaat .xlsx-tiedoston?',
            options: ['Microsoft Word', 'Microsoft Excel', 'Microsoft PowerPoint', 'Adobe Reader'],
            correct: 1
        },
        {
            question: 'Mikä tiedostopääte on PDF-dokumentilla?',
            options: ['.docx', '.pdf', '.txt', '.pptx'],
            correct: 1
        },
        {
            question: 'Mikä näistä on kuvaformaatti?',
            options: ['.mp3', '.docx', '.png', '.zip'],
            correct: 2
        },
        {
            question: 'Mitä .zip-tiedosto sisältää?',
            options: ['Äänitiedoston', 'Yhden kuvan', 'Pakattuja tiedostoja', 'Esityksen'],
            correct: 2
        },
        {
            question: 'Kumpi on parempi lähettää sähköpostilla: .docx vai .pdf?',
            options: ['.docx – koska sitä voi muokata', '.pdf – koska se näyttää samalta kaikilla laitteilla'],
            correct: 1
        },
        {
            question: 'Mikä tiedostopääte liittyy PowerPoint-esitykseen?',
            options: ['.docx', '.xlsx', '.pptx', '.txt'],
            correct: 2
        }
    ];

    let qIndex = 0;
    let quizScore = 0;
    const quizDiv = document.getElementById('quiz-section');

    function renderQuiz() {
        if (qIndex >= quizData.length) {
            quizDiv.innerHTML = `
                <div class="success-message">
                    🎉 <strong>Tietovisa suoritettu!</strong> Sait ${quizScore}/${quizData.length} oikein.
                    <br><small>Voit palata <a href="index.html" style="color: #2e7d32;">harjoitusvalikkoon</a>.</small>
                </div>`;
            return;
        }

        const q = quizData[qIndex];
        let optionsHtml = q.options.map((opt, i) => `
            <button class="quiz-option" data-index="${i}">${opt}</button>
        `).join('');

        quizDiv.innerHTML = `
            <div class="info-panel">
                <h3>Osa B: Tiedostomuoto-tietovisa (${qIndex + 1}/${quizData.length})</h3>
            </div>
            <div class="task-panel">
                <span class="task-label">Kysymys:</span>
                <span class="task-text">${q.question}</span>
            </div>
            <div class="quiz-options">${optionsHtml}</div>
            <div id="quiz-feedback"></div>
        `;

        quizDiv.querySelectorAll('.quiz-option').forEach(btn => {
            btn.addEventListener('click', () => handleQuizAnswer(parseInt(btn.dataset.index)));
        });
    }

    function handleQuizAnswer(selectedIndex) {
        const q = quizData[qIndex];
        const fb = document.getElementById('quiz-feedback');
        const buttons = quizDiv.querySelectorAll('.quiz-option');

        buttons.forEach(b => {
            b.disabled = true;
            const idx = parseInt(b.dataset.index);
            if (idx === q.correct) b.classList.add('correct');
            if (idx === selectedIndex && idx !== q.correct) b.classList.add('wrong');
        });

        if (selectedIndex === q.correct) {
            quizScore++;
            fb.innerHTML = `<div class="hint-box" style="background:#e8f5e9; border-color:#81c784; color:#2e7d32;">✅ Oikein!</div>`;
        } else {
            fb.innerHTML = `<div class="hint-box" style="background:#ffebee; border-color:#ef9a9a; color:#c62828;">
                ❌ Oikea vastaus: <strong>${q.options[q.correct]}</strong></div>`;
        }

        qIndex++;
        setTimeout(renderQuiz, 1800);
    }

    renderQuiz();
    </script>
    <style>
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 12px 0;
        }
        .quiz-option {
            padding: 12px 16px;
            border: 2px solid #bbdefb;
            border-radius: 8px;
            background: #e3f2fd;
            color: #1a1a1a;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.2s, background 0.2s;
        }
        .quiz-option:hover:not(:disabled) {
            border-color: #2980b9;
            background: #bbdefb;
        }
        .quiz-option:disabled {
            cursor: default;
            opacity: 0.85;
        }
        .quiz-option.correct {
            border-color: #81c784;
            background: #e8f5e9;
        }
        .quiz-option.wrong {
            border-color: #ef9a9a;
            background: #ffebee;
        }
    </style>
</body>
</html>
