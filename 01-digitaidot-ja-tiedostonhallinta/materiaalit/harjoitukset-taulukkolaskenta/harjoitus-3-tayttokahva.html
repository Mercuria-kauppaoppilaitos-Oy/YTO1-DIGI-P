<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harjoitus 3: Täyttökahva – kaavan kopioiminen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="exercise-container">
        <a href="index.html" class="back-link">← Takaisin harjoitusvalikkoon</a>
        <div class="exercise-header">
            <h1>Harjoitus 3: Täyttökahva – kaavan kopioiminen</h1>
            <p>Kirjoita kaava yhteen soluun ja kopioi se automaattisesti muihin riveihin.</p>
        </div>
        <div id="exercise" class="exercise-content"></div>
    </div>

    <script src="spreadsheet-engine.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const tuotteet = ['Tuote A', 'Tuote B', 'Tuote C', 'Tuote D', 'Tuote E'];
        const tammi = tuotteet.map(() => randomInt(500, 3000));
        const helmi = tuotteet.map(() => randomInt(500, 3000));

        const cells = {
            'A1': { type: 'header', value: 'Tuote' },
            'B1': { type: 'header', value: 'Tammikuu (€)' },
            'C1': { type: 'header', value: 'Helmikuu (€)' },
            'D1': { type: 'header', value: 'Yhteensä (€)' }
        };

        for (let i = 0; i < tuotteet.length; i++) {
            const r = i + 2;
            cells['A' + r] = { type: 'label', value: tuotteet[i] };
            cells['B' + r] = { type: 'data', value: tammi[i] };
            cells['C' + r] = { type: 'data', value: helmi[i] };
        }

        // Ensimmäinen rivi: opiskelija kirjoittaa kaavan
        cells['D2'] = {
            type: 'editable',
            expectedValue: tammi[0] + helmi[0],
            requiredRefs: ['B2', 'C2'],
            hint: '=B2+C2',
            placeholder: '=B2+C2'
        };

        // Loput rivit: täytetään automaattisesti fill-painikkeella
        const fillTargets = [];
        for (let i = 1; i < tuotteet.length; i++) {
            const r = i + 2;
            fillTargets.push('D' + r);
            cells['D' + r] = {
                type: 'fill-target',
                source: 'D2',
                expectedValue: tammi[i] + helmi[i]
            };
        }

        const exercise = new SpreadsheetExercise({
            containerId: 'exercise',
            cols: ['A', 'B', 'C', 'D'],
            rowCount: tuotteet.length + 1,
            cells: cells,
            fillGroups: [
                { source: 'D2', targets: fillTargets }
            ],
            instructions: `
                <strong>Tehtävä:</strong> Laske tuotteiden kokonaismyynti kahdelta kuukaudelta.<br>
                <ol>
                    <li>Kirjoita soluun <strong>D2</strong> kaava <code>=B2+C2</code> (tammikuu + helmikuu)</li>
                    <li>Paina Enter – jos kaava on oikein, ✓-merkki ilmestyy</li>
                    <li>Klikkaa <strong>"⬇ Kopioi kaava alas"</strong> -painiketta</li>
                    <li>Huomaa, miten soluviittaukset muuttuvat automaattisesti jokaiselle riville!</li>
                </ol>
                <strong>Opittava asia:</strong> Kun kaava kopioidaan alaspäin, soluviittaukset
                muuttuvat suhteellisesti: =B2+C2 → =B3+C3 → =B4+C4 jne.
            `
        });

        exercise.init();
    });
    </script>
</body>
</html>
